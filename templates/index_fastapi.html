<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stroke Risk Predictor (FastAPI)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
    <div class="container">
        <h1 class="mb-3">Stroke Risk Predictor</h1>

        <form id="predict-form">
            <div id="inputs" class="row"></div>
            <button class="btn btn-primary mt-3" type="submit">Predict</button>
        </form>

        <div id="result" class="mt-4" style="display:none">
            <h3>Result</h3>
            <p><strong>Prediction:</strong> <span id="out-pred"></span></p>
            <p><strong>Probability:</strong> <span id="out-prob"></span></p>
            <p id="out-readable" style="font-style:italic;"></p>
            <div id="out-inputs"></div>
            <div id="out-shap" class="mt-3"></div>
        </div>
    </div>

    <script>
        async function buildForm() {
            const cfg = await (await fetch('/config')).json();
            const features = cfg.features || [];
            const inputsDiv = document.getElementById('inputs');
            features.forEach(meta => {
                const f = meta.name;
                const col = document.createElement('div');
                col.className = 'col-md-6 mb-2';
                const label = document.createElement('label');
                label.className = 'form-label';
                label.innerText = f;

                let control;
                if (meta.options && meta.options.length <= 6) {
                    // render dropdown for small number of options
                    control = document.createElement('select');
                    control.className = 'form-select';
                    control.id = `fld-${f}`;
                    control.name = f;
                    meta.options.forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt.value;
                        o.innerText = `${opt.label} (${opt.value})`;
                        if (meta.example !== undefined && String(opt.value) === String(meta.example)) o.selected = true;
                        control.appendChild(o);
                    });
                } else {
                    // numeric or free text input with example placeholder
                    control = document.createElement('input');
                    control.className = 'form-control';
                    control.id = `fld-${f}`;
                    control.name = f;
                    control.required = true;
                    if (meta.example !== undefined) control.placeholder = String(meta.example);
                }

                col.appendChild(label);
                col.appendChild(control);
                inputsDiv.appendChild(col);
            });
        }

        document.getElementById('predict-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const data = {};
            document.querySelectorAll('#inputs input, #inputs select').forEach(inp => { data[inp.name] = inp.value; });

            const resp = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const j = await resp.json();
            if (resp.ok) {
                document.getElementById('result').style.display = 'block';
                document.getElementById('out-pred').innerText = j.prediction;
                document.getElementById('out-prob').innerText = j.probability ?? 'N/A';
                document.getElementById('out-readable').innerText = j.readable_prediction || '';
                const inputsDiv = document.getElementById('out-inputs');
                inputsDiv.innerHTML = '<h5>Inputs</h5><ul>' + Object.entries(j.input).map(([k, v]) => `<li><strong>${k}:</strong> ${v}</li>`).join('') + '</ul>';
                const shapDiv = document.getElementById('out-shap');
                shapDiv.innerHTML = j.shap_image ? `<h5>SHAP</h5><img src="${j.shap_image}" class="img-fluid"/>` : '<p>No explanation available.</p>';
                const sugDiv = document.getElementById('out-suggestions');
                if (!sugDiv) {
                    const d = document.createElement('div');
                    d.id = 'out-suggestions';
                    d.className = 'mt-3';
                    document.getElementById('result').appendChild(d);
                }
                document.getElementById('out-suggestions').innerHTML = `<h5>Suggestions</h5><p>${(j.suggestions || 'No suggestions')}</p>`;
            } else {
                alert(j.error || 'Prediction failed');
            }
        });
        buildForm().catch(console.error);
    </script>
</body>

</html>
